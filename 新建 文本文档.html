<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>张三 - 电子名片</title>
    <style>
        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", Arial, sans-serif;
        }

        /* 页面背景与主体容器 */
        body {
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card-container {
            background-color: white;
            width: 100%;
            max-width: 400px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            padding: 40px 20px;
            text-align: center;
        }

        /* 头像样式 */
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #e8f4f8;
            margin-bottom: 20px;
        }

        /* 姓名与职位 */
        .name {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }

        .position {
            font-size: 16px;
            color: #666;
            margin-bottom: 25px;
        }

        /* 联系方式列表 */
        .contact-list {
            list-style: none;
            margin-bottom: 30px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 12px 0;
            font-size: 15px;
            color: #555;
        }

        .contact-item svg {
            width: 20px;
            height: 20px;
            margin-right: 10px;
            fill: #4299e1;
        }

        /* 社交链接按钮 */
        .social-links {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .social-link {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #f0f8fb;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            transition: background-color 0.3s;
        }

        .social-link:hover {
            background-color: #4299e1;
        }

        .social-link:hover svg {
            fill: white;
        }

        .social-link svg {
            width: 20px;
            height: 20px;
            fill: #4299e1;
            transition: fill 0.3s;
        }

        /* 保存通讯录按钮 */
        .vcard-btn {
            display: inline-block;
            padding: 10px 25px;
            background-color: #4299e1;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 15px;
            margin-bottom: 25px;
            transition: background-color 0.3s;
        }

        .vcard-btn:hover {
            background-color: #3182ce;
        }

        /* 二维码样式 */
        .qrcode {
            width: 150px;
            height: 150px;
            border-radius: 8px;
            object-fit: cover;
            margin: 0 auto;
        }

        /* 响应式适配 */
        @media (max-width: 375px) {
            .card-container {
                padding: 30px 15px;
            }
            .avatar {
                width: 100px;
                height: 100px;
            }
            .qrcode {
                width: 130px;
                height: 130px;
            }
        }
    </style>
</head>
<body>
